services:
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
  
  mongo:
    image: mongo:latest
    container_name: mongo-database
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: database-name
    volumes:
      - mongo-data:/data/db

volumes:
  redis-data:
  mongo-data: